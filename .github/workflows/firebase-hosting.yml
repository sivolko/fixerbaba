name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
          npm rebuild || true

      - name: Validate build
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p "$RUNNER_TEMP/firebase"
          KEYFILE="$RUNNER_TEMP/firebase/key.json"

          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "ERROR: FIREBASE_SERVICE_ACCOUNT secret is empty" >&2
            exit 1
          fi

          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$KEYFILE"

          if [ ! -s "$KEYFILE" ]; then
            echo "ERROR: wrote empty keyfile" >&2
            exit 1
          fi

          if ! python - <<'PY' "$KEYFILE"
          import base64
          import json
          import pathlib
          import sys

          path = pathlib.Path(sys.argv[1])
          raw = path.read_text().strip()

          if not raw:
              raise SystemExit("empty service account content")

          try:
              payload = json.loads(raw)
          except Exception:
              try:
                  decoded = base64.b64decode(raw).decode()
                  payload = json.loads(decoded)
              except Exception:
                  try:
                      payload = json.loads(raw.replace('\\n', '\n'))
                  except Exception as e:
                      raise SystemExit(f"could not parse service account: {e}")

          if not payload.get('private_key'):
              raise SystemExit('service account key is missing private_key')

          path.write_text(json.dumps(payload, indent=2))
          PY
          then
            echo "ERROR: could not parse Firebase service account credentials" >&2
            exit 1
          fi

          echo "GOOGLE_APPLICATION_CREDENTIALS=$KEYFILE" >> "$GITHUB_ENV"
          echo "Wrote service account key to $KEYFILE"

      - name: Install Firebase CLI
        run: npm install --no-save firebase-tools@latest

      - name: Deploy to Firebase Hosting (production)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase/key.json
        run: |
          npx firebase-tools deploy --project fixerbaba-6fdcb --only hosting --non-interactive
