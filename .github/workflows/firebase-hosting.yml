name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          # try a clean install from lockfile, fall back to install if needed
          npm ci || npm install
          # rebuild native modules if any exist
          npm rebuild || true

      - name: Build
        run: npm run build

      - name: Prepare Firebase credentials
        run: |
          mkdir -p ${{ runner.temp }}/firebase
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > ${{ runner.temp }}/firebase/key.json
          export GOOGLE_APPLICATION_CREDENTIALS=${{ runner.temp }}/firebase/key.json

      - name: Deploy to Firebase Hosting (production)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase/key.json
        run: |
          npx firebase-tools@latest deploy --project fixerbaba-6fdcb --only hosting --non-interactive
